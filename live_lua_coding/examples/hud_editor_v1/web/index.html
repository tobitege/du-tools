<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Lua Painter Harness</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #2a2f3f 0%, #141821 45%, #0a0d14 100%);
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #e7edf4;
    }

    #harness-panel {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 200000;
      width: 320px;
      border: 1px solid rgba(150, 185, 205, 0.25);
      border-radius: 14px;
      background: rgba(8, 12, 18, 0.88);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      user-select: none;
      pointer-events: none;
    }

    #harness-header {
      pointer-events: auto;
    }

    #harness-body {
      pointer-events: none;
    }

    .harness-actions,
    #harness-state,
    #harness-log {
      pointer-events: auto;
    }

    #harness-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: grab;
      border-radius: 13px 13px 0 0;
    }

    #harness-panel.collapsed #harness-header {
      border-radius: 13px;
    }

    #harness-header:active {
      cursor: grabbing;
    }

    #harness-title {
      font-size: 15px;
      font-weight: 700;
      color: #e7edf4;
    }

    #harness-rollup-btn {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(120, 165, 185, 0.3);
      border-radius: 6px;
      background: rgba(19, 29, 40, 0.8);
      color: #9ab8c8;
      font-size: 11px;
      cursor: pointer;
      line-height: 1;
    }

    #harness-rollup-btn:hover {
      background: rgba(28, 43, 58, 0.98);
      color: #cde6f0;
    }

    #harness-body {
      padding: 0 14px 14px;
      border-top: 1px solid rgba(150, 185, 205, 0.10);
    }

    #harness-panel.collapsed #harness-body {
      display: none;
    }

    #harness-panel p {
      margin: 10px 0 12px;
      font-size: 12px;
      line-height: 1.45;
      color: #aeb9c4;
    }

    .harness-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .harness-actions button {
      min-height: 36px;
      border: 1px solid rgba(120, 165, 185, 0.35);
      border-radius: 9px;
      background: rgba(19, 29, 40, 0.95);
      color: #eef8fb;
      font: 600 13px/1.2 "Segoe UI", Tahoma, sans-serif;
      cursor: pointer;
    }

    .harness-actions button:hover {
      background: rgba(28, 43, 58, 0.98);
    }

    #harness-state,
    #harness-log {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(120, 165, 185, 0.18);
      border-radius: 10px;
      background: rgba(7, 11, 17, 0.78);
      color: #dfe9f1;
      font: 12px/1.45 Consolas, "Courier New", monospace;
      padding: 10px;
    }

    #harness-state {
      min-height: 120px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    #harness-log {
      height: 180px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <aside id="harness-panel">
    <div id="harness-header">
      <span id="harness-title">Lua Painter Harness</span>
      <button id="harness-rollup-btn" title="Collapse / expand">▼</button>
    </div>
    <div id="harness-body">
      <p>Loads the built HUD payload in a normal browser, provides a fake runtime module context, and captures export packets for Playwright-driven testing.</p>
      <div class="harness-actions">
        <button id="btn-open">Open HUD</button>
        <button id="btn-close">Close HUD</button>
        <button id="btn-new">New Script</button>
        <button id="btn-load-fixture">Load Fixture</button>
        <button id="btn-reset-storage">Reset Storage</button>
        <button id="btn-dump-state">Dump State</button>
        <button id="btn-clear-log">Clear Log</button>
      </div>
      <div id="harness-state">Waiting for payload…</div>
      <div id="harness-log"></div>
    </div>
  </aside>

  <script>
    (function () {
      var panel  = document.getElementById('harness-panel')
      var header = document.getElementById('harness-header')
      var btn    = document.getElementById('harness-rollup-btn')

      // ── Collapse / expand ──────────────────────────────────────────────
      btn.addEventListener('click', function (e) {
        e.stopPropagation()
        var collapsed = panel.classList.toggle('collapsed')
        btn.textContent = collapsed ? '▲' : '▼'
        btn.title = collapsed ? 'Expand' : 'Collapse'
      })

      // ── Drag ───────────────────────────────────────────────────────────
      var dragging = false
      var dragOffX = 0
      var dragOffY = 0

      header.addEventListener('mousedown', function (e) {
        if (e.target === btn) return
        dragging = true
        var rect = panel.getBoundingClientRect()
        dragOffX = e.clientX - rect.left
        dragOffY = e.clientY - rect.top
        panel.style.left = rect.left + 'px'
        panel.style.top  = rect.top  + 'px'
        header.style.cursor = 'grabbing'
        e.preventDefault()
      })

      document.addEventListener('mousemove', function (e) {
        if (!dragging) return
        var x = e.clientX - dragOffX
        var y = e.clientY - dragOffY
        // Keep within viewport
        x = Math.max(0, Math.min(x, window.innerWidth  - panel.offsetWidth))
        y = Math.max(0, Math.min(y, window.innerHeight - panel.offsetHeight))
        panel.style.left = x + 'px'
        panel.style.top  = y + 'px'
      })

      document.addEventListener('mouseup', function () {
        if (!dragging) return
        dragging = false
        header.style.cursor = ''
      })
    })()
  </script>

  <script type="module" src="./harness.js?v=3"></script>
</body>
</html>
