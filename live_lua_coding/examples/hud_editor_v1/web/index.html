<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lua Painter Harness</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #2a2f3f 0%, #141821 45%, #0a0d14 100%);
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #e7edf4;
    }

    #harness-panel {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 2147483600;
      width: 320px;
      padding: 14px;
      border: 1px solid rgba(150, 185, 205, 0.25);
      border-radius: 14px;
      background: rgba(8, 12, 18, 0.88);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    #harness-panel h1 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 700;
    }

    #harness-panel p {
      margin: 0 0 12px;
      font-size: 12px;
      line-height: 1.45;
      color: #aeb9c4;
    }

    .harness-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .harness-actions button {
      min-height: 36px;
      border: 1px solid rgba(120, 165, 185, 0.35);
      border-radius: 9px;
      background: rgba(19, 29, 40, 0.95);
      color: #eef8fb;
      font: 600 13px/1.2 "Segoe UI", Tahoma, sans-serif;
      cursor: pointer;
    }

    .harness-actions button:hover {
      background: rgba(28, 43, 58, 0.98);
    }

    #harness-state,
    #harness-log {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(120, 165, 185, 0.18);
      border-radius: 10px;
      background: rgba(7, 11, 17, 0.78);
      color: #dfe9f1;
      font: 12px/1.45 Consolas, "Courier New", monospace;
      padding: 10px;
    }

    #harness-state {
      min-height: 120px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    #harness-log {
      height: 180px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <aside id="harness-panel">
    <h1>Lua Painter Harness</h1>
    <p>Loads the built HUD payload in a normal browser, provides a fake runtime module context, and captures export packets for Playwright-driven testing.</p>
    <div class="harness-actions">
      <button id="btn-open">Open HUD</button>
      <button id="btn-close">Close HUD</button>
      <button id="btn-new">New Script</button>
      <button id="btn-load-fixture">Load Fixture</button>
      <button id="btn-reset-storage">Reset Storage</button>
      <button id="btn-dump-state">Dump State</button>
      <button id="btn-clear-log">Clear Log</button>
    </div>
    <div id="harness-state">Waiting for payload…</div>
    <div id="harness-log"></div>
  </aside>

  <script type="module" src="./harness.js"></script>
</body>
</html>
